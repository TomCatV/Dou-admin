name: Deploy Dou-Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dou-admin-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          mkdir -p "$RUNNER_TEMP/ssh-control"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "ssh-keyscan failed after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done
          sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
          echo "SSH_COMMAND=ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -o ConnectionAttempts=5 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o TCPKeepAlive=yes -o ControlMaster=auto -o ControlPersist=10m -o ControlPath=$RUNNER_TEMP/ssh-control/%C" >> "$GITHUB_ENV"

      - name: Upload dist
        run: |
          retry() {
            local attempt delay
            delay=8
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 5 ]; then
                return 1
              fi
              echo "command failed, retrying in ${delay}s (attempt ${attempt}/5)" >&2
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          retry rsync -az --delete \
            -e "$SSH_COMMAND" \
            dist/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/dist-next/"

      - name: Switch release
        run: |
          retry() {
            local attempt delay
            delay=8
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 5 ]; then
                return 1
              fi
              echo "command failed, retrying in ${delay}s (attempt ${attempt}/5)" >&2
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          switch_release() {
            local deploy_path_quoted
            deploy_path_quoted=$(printf '%q' "$DEPLOY_PATH")
            $SSH_COMMAND "$SSH_USER@$SSH_HOST" "DEPLOY_PATH=$deploy_path_quoted sh -se" <<'REMOTE'
          set -eu
          cd "$DEPLOY_PATH"

          if [ ! -f dist-next/index.html ]; then
            if [ -f dist/index.html ]; then
              echo 'dou-admin deploy success (already switched)'
              exit 0
            fi
            if [ -f dist-prev/index.html ]; then
              rm -rf dist
              mv dist-prev dist
            fi
            echo 'dist-next/index.html missing and release is not ready' >&2
            exit 1
          fi

          rollback() {
            status=$?
            if [ "$status" -ne 0 ] && [ ! -f dist/index.html ] && [ -d dist-prev ]; then
              rm -rf dist
              mv dist-prev dist
            fi
            exit "$status"
          }
          trap rollback EXIT

          chattr -i dist/.user.ini dist-prev/.user.ini dist-next/.user.ini 2>/dev/null || true
          rm -rf dist-prev
          if [ -d dist ]; then mv dist dist-prev; fi
          mv dist-next dist
          test -f dist/index.html
          trap - EXIT
          echo 'dou-admin deploy success'
          REMOTE
          }

          retry switch_release

      - name: Close SSH control connection
        if: always()
        run: |
          if [ -n "${SSH_COMMAND:-}" ]; then
            $SSH_COMMAND -O exit "$SSH_USER@$SSH_HOST" 2>/dev/null || true
          fi
